# my_agent/adk.config.yaml
version: 1
streaming: true
port: 8080
name: "Stock Advisor"
chat:
  interface:
    showSendButton: true
    showOptionsButton: true
    showStreamingButton: true
description: "Hệ thống tư vấn chứng khoán thông minh với phân tích đa chiều"
instruction: |
  Hãy hỏi tôi về bất kỳ cổ phiếu nào bạn quan tâm. 
  Tôi có thể:
  • Phân tích kỹ thuật (EMA, RSI, xu hướng...)
  • Tổng hợp tin tức mới nhất
  • Phân tích sentiment trên mạng xã hội
  • Đánh giá chỉ số tài chính cơ bản
  • Đưa ra khuyến nghị tổng hợp

  Ví dụ:
  "Phân tích cổ phiếu AAPL"
  "Cho tôi biết tin tức về TSLA"
  "Phân tích cơ bản của FPT"

model:
  provider: google
  name: gemini-2.0-flash
  temperature: 0.7

tools:
  - name: transfer_to_agent
    description: "Chuyển yêu cầu đến agent con chuyên biệt"
    parameters:
      agent_name:
        type: string
        enum: [price_agent, news_agent, sentiment_agent, financial_agent, technical_analysis_agent]
        description: "Tên agent con (price/news/sentiment/financial/technical_analysis)"
      message:
        type: string
        description: "Yêu cầu gửi cho agent con"